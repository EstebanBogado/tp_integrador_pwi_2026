</head>

<body>
  <header>
    <nav class="menu">
      <a href="../index.html" class="logo"><img src="../IMG/logo-aero-viajes.jpg" width="300px" height="200px"
          alt="logo aero viajes"></a>

        <p>vuelos</p>

    </nav>
  </header>

  <main>
    <h1>Pago Online</h1>
    <p>Complete su check-in rápido y sencillo</p>

    <section class="formulario-checkin">
      <form>
        <fieldset>
          <legend class="titulo">Datos del vuelo</legend>
          <label>Código de reserva:</label>
          <input type="text" name="codigo">
          <button class="buscar-reserva">Buscar reserva</button>


        </fieldset>

        <!--  <fieldset>
          <legend class="titulo">Datos del pasajero</legend>
          <label>Apellido:</label>
          <input type="text" name="apellido">
          <label>Nombre:</label>
          <input type="text" name="nombre">
        </fieldset> -->

        <fieldset class="tipo-tarjeta">
          <legend class="titulo">Datos de la tarjeta</legend>
          <label>
            <input type="radio" name="tipo-viaje" value="ida-vuelta" checked>
            Tarjeta de crédito
            <input type="radio" name="tipo-viaje" value="solo-ida">
            Tarjeta de débito
          </label>
          <label for="">Nro. de tarjeta
            <input type="number" name="nro-de-tarjeta" id="">
          </label>
          <fieldset>
            <label for="mes-anio">Vencimiento (MM/YYYY):
              <input type="text" id="mes-anio" name="mes-anio" pattern="\d{2}/\d{4}" placeholder="MM/YYYY" required>
            </label>
            <label for="cvv" id="cvv">CVV:
              <input type="number" maxlength="3" placeholder="***" required>
            </label>
          </fieldset>
          <label for="titular">Nombre y Apellido del titular
            <input type="text" name="titular" id="">
          </label>
          <label for=""></label>
        </fieldset>
        <fieldset>
          <label>Documento / Pasaporte:</label>
          <input type="text" name="documento">
        </fieldset>
        <div class="botones">
          <a href="../PAGES/check-in.html">
            <p class="confirmar">Confirmmar pago</p>
          </a>

          <!--           <a href="../PAGES/check-in.html"><button class="confirmar">
              <p>Confirmar pago</p>
            </button></a> -->
          <button class="cancelar">Cancelar</button>
        </div>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; Todos los derechos reservados 2026.</p>
  </footer>
