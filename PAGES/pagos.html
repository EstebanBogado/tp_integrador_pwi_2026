<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pago - Checkout</title>
  <link rel="stylesheet" type="text/css" href="../CSS/styles.css">
  <link rel="stylesheet" type="text/css" href="../CSS/etiquetas.css">
  <link rel="stylesheet" type="text/css" href="../CSS/check-in.css">
</head>
<body>
  <header id="header"></header>

  <main>
    <h1>Checkout de Compra</h1>
    
    <div class="contenedor-checkout">
      <form id="form-checkout" class="formulario-checkin" onsubmit="return false;">
        
        <fieldset>
          <legend class="titulo">Datos del Pasajero</legend>
          <div class="grupo-campo">
            <label for="nombre">Nombre Completo:</label>
            <input type="text" id="nombre" required>
          </div>
          <div class="grupo-campo">
            <label for="documento-pax">Documento de Identidad:</label>
            <input type="text" id="documento-pax" required>
          </div>
          <div class="grupo-campo">
            <label for="correo">Correo Electrónico:</label>
            <input type="email" id="correo" required>
          </div>
          <div class="grupo-campo">
            <label for="telefono">Teléfono (opcional):</label>
            <input type="text" id="telefono">
          </div>
        </fieldset>

        <fieldset class="tipo-tarjeta">
          <legend class="titulo">Método de Pago</legend>
          <div class="selectores-pago">
            <label class="opcion-radio">
              <input type="radio" id="credito" name="medio-de-pago" value="tarjeta" checked> Tarjeta de Crédito
            </label>
            <label class="opcion-radio">
              <input type="radio" id="transferencia" name="medio-de-pago" value="transferencia"> Transferencia Bancaria
            </label>
          </div>

          <div id="bloque-tarjeta" class="metodo-bloque">
            <div class="grupo-campo">
              <label>Nro. de tarjeta:</label>
              <input type="number" id="nro-tarjeta">
            </div>
            <div class="fila-campos">
              <div class="grupo-campo">
                <label>Vencimiento (MM/YYYY):</label>
                <input type="text" id="vencimiento" placeholder="MM/YYYY">
              </div>
              <div class="grupo-campo">
                <label>CVV:</label>
                <input type="password" id="cvv" maxlength="3" placeholder="***">
              </div>
            </div>
            <div class="grupo-campo">
              <label>Titular de la tarjeta:</label>
              <input type="text" id="titular-tarjeta">
            </div>
          </div>

          <div id="bloque-transferencia" class="metodo-bloque" style="display: none;">
            <div class="grupo-campo">
              <label>Nro. de CBU:</label>
              <input type="number" id="nro-cbu">
            </div>
            <div class="grupo-campo">
              <label>Alias / Nro. Cuenta:</label>
              <input type="text" id="nro-cuenta">
            </div>
            <div class="grupo-campo">
              <label>Titular de la cuenta:</label>
              <input type="text" id="titular-cuenta">
            </div>
          </div>
        </fieldset>

        <div class="botones">
          <button type="submit" class="confirmar" id="btn-pagar">Confirmar el pago</button>
          <button type="reset" class="cancelar" id="btn-cancelar">Cancelar</button>
        </div>
      </form>

      <aside class="resumen-vuelo-checkout">
        <h3 class="titulo-resumen">Resumen de Vuelo</h3>
        <div id="detalle-ruta-resumen" class="info-resumen">
          </div>
        
        <hr>
        
        <div class="seccion-cupon">
          <label for="input-cupon">¿Tenés un cupón?</label>
          <div class="fila-cupon">
            <input type="text" id="input-cupon" placeholder="Código">
            <button type="button" id="btn-cupon">Aplicar</button>
          </div>
          <p id="mensaje-cupon"></p>
        </div>

        <div class="total-checkout">
          <span>Total a pagar:</span>
          <span id="total-monto">$0.00</span>
        </div>
      </aside>
    </div>

    <div class="etiqueta-vuelo ir-al-check-in">
      <a href="../PAGES/check-in.html"><h3>Ir al check-in online</h3></a>
    </div>
  </main>

  <footer id="footer"></footer>
  
  <script src="../JS/header-footer.js"></script>
  <script src="../JS/script.js"></script>
  <script src="../JS/checkout.js"></script>
</body>
</html>
