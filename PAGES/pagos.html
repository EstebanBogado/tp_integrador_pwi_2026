<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" type="text/css" href="../CSS/styles.css">
  <link rel="stylesheet" type="text/css" href="../CSS/etiquetas.css">

</head>

<body>
  <header>
    <nav class="menu">
      <a href="../index.html" class="logo"><img src="../IMG/logo-aero-viajes.jpg" width="300px" height="200px"
          alt="logo aero viajes"></a>

        <p>inicio</p>
      </a>
      <a href="../PAGES/resultado busqueda.html">
        <p>vuelos</p>

      <a href="">
        <p>Ofertas</p>
      </a>
      <a href="">
        <p>Contacto</p>
      </a>
      <p>ingresar/registrarse</p>
    </nav>
  </header>

  <main>
    <h1>Pago Online</h1>
    <p>Seleccione el medio de pago</p>

    <section class="formulario-checkin">
      <form method="post">
        <fieldset>
          <legend class="titulo">Datos del vuelo</legend>
          <label>Código de reserva:</label>
          <input type="text" name="codigo" required>
          <button class="buscar-reserva">Buscar reserva</button>
        </fieldset>
        <!--  <fieldset>
          <legend class="titulo">Datos del pasajero</legend>
          <label>Apellido:</label>
          <input type="text" name="apellido">
          <label>Nombre:</label>
          <input type="text" name="nombre">
        </fieldset> -->
        <fieldset class="tipo-tarjeta">
          <legend class="titulo">Medio de pago</legend>
          <!-- ***************************************************** -->
          <div class="contenedor-medio-de-pago">
            
            <label for="credito">Tarjeta de crédito</label>
            <input type="radio" id="credito" name="medio-de-pago" required>
            <label for="transferencia">Transferencia bancaria</label>
            <input type="radio" id="transferencia" name="medio-de-pago" required>
            <div class="tarjeta">
              <label for="">Nro. de tarjeta
                <input type="number" name="nro-de-tarjeta" id="" required>
              </label>
              <fieldset>
                <label for="mes-anio">Vencimiento (MM/YYYY):
                  <input type="date" id="mes-anio" name="mes-anio" pattern="\d{2}/\d{4}" placeholder="MM/YYYY" required>
                </label>
                <label for="cvv" id="cvv">CVV:
                  <input type="number" maxlength="3" placeholder="***" required>
                </label>
              </fieldset>
              <label for="titular">Nombre y Apellido del titular
                <input type="text" name="titular" id="" required>
              </label>
              <label for=""></label>
              <fieldset>
                <label>Documento / Pasaporte:</label>
                <input type="text" name="documento" required>
              </fieldset>
            </div>
            <!-- ************************************************************** -->
            <div class="transferencia">
              <label for="">Nro. de CBU
                <input type="number" name="nro-de-cbu" id="" required>
              </label>
              <fieldset>
                <label for="mes-anio">Nro. de Cuenta:
                  <input type="number" name="nro-de-cuenta" id="" required>
                </label>
              </fieldset>
              <label for="titular">Nombre y Apellido del titular
                <input type="text" name="titular" id="" required>
              </label>
              <label for=""></label>
              <fieldset>
                <label>Documento / Pasaporte:</label>
                <input type="text" name="documento" required>
              </fieldset>
            </div>
          </div>
          <!-- ************************************************************** -->
          <div class="botones">
            <input type="submit" name="" id="" value="Confirmar el pago" class="confirmar">

            <button class="cancelar" type="reset">Cancelar</button>
          </div>

      </form>

    </section>
    <div class="etiqueta-vuelo ir-al-check-in">
      <a href="../PAGES/check-in.html">
        <h3>Ir al check-in online</h3>
      </a>
    </div>
  </main>

  <footer>
    <p>&copy; Todos los derechos reservados 2026.</p>
  </footer>
</body>

</html>
