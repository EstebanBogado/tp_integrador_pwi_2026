<!DOCTYPE html>
<html lang="en">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado Búsqueda</title>
    <link rel="stylesheet" type="text/css" href="../CSS/styles.css">
    <link rel="stylesheet" type="text/css" href="../CSS/etiquetas.css">
    <link rel="stylesheet" type="text/css" href="../CSS/resultado-busqueda.css">
</head>
 
<body>
    <header id="header"></header>
 
    <main>
        <section class="vuelos-disponibles">
 
            <!-- ASIDE: formulario + filtros -->
            <aside class="section-vuelo" id="section-vuelo">
 
                <p class="etiqueta-vuelo">Tu búsqueda</p>
                <fieldset>
                    <form action="" class="form-vuelos">
                        <label for="desde">Desde</label>
                        <select name="desde" id="desde" class="campos-form">
                            <option value=""></option>
                            <option value="BUE">Ezeiza, Buenos Aires (EZE)</option>
                            <option value="AEP">Aeroparque, CABA (AEP)</option>
                            <option value="BRC">Bariloche, Río Negro (BRC)</option>
                            <option value="COR">Córdoba (COR)</option>
                        </select>
                        <label for="destino">Destino</label>
                        <select name="destino" id="destino" class="campos-form">
                            <option value=""></option>
                            <option value="MAD">Madrid (MAD)</option>
                            <option value="MIA">Miami (MIA)</option>
                            <option value="LIM">Lima (LIM)</option>
                            <option value="GRU">São Paulo (GRU)</option>
                        </select>
                        <label for="fecha-salida">Fecha Salida</label>
                        <input type="date" name="fecha-salida" id="fecha-salida" class="campos-form">
                        <label for="fecha-vuelta">Fecha Regreso</label>
                        <input type="date" name="fecha-vuelta" id="fecha-vuelta" class="campos-form">
                    </form>
                </fieldset>
 
                <!-- FILTROS -->
                <div class="filtros">
                    <p class="etiqueta-vuelo">Filtrar por</p>
 
                    <!-- Precio -->
                    <div class="accordion">
                        <button class="accordion-header" type="button">Precio ▾</button>
                        <div class="accordion-body" id="filtro-precio">
                            <div class="precio-labels">
                                <span id="label-precio-min">$0</span>
                                <span id="label-precio-max">$0</span>
                            </div>
                            <label for="range-precio-min">Mínimo</label>
                            <input type="range" id="range-precio-min" class="range-filtro">
                            <label for="range-precio-max">Máximo</label>
                            <input type="range" id="range-precio-max" class="range-filtro">
                        </div>
                    </div>
 
                    <!-- Tipo de vuelo -->
                    <div class="accordion">
                        <button class="accordion-header" type="button">Tipo de vuelo ▾</button>
                        <div class="accordion-body">
                            <label class="filtro-label">
                                <input type="checkbox" name="tipo-vuelo" value="directo"> Directo
                            </label>
                            <label class="filtro-label">
                                <input type="checkbox" name="tipo-vuelo" value="con-escalas"> Con escalas
                            </label>
                        </div>
                    </div>
 
                    <!-- Aerolínea (se genera dinámicamente) -->
                    <div class="accordion">
                        <button class="accordion-header" type="button">Aerolínea ▾</button>
                        <div class="accordion-body" id="filtro-aerolineas">
                            <!-- JS -->
                        </div>
                    </div>
                    <!-- Equipaje -->
                    <div class="accordion">
                        <button class="accordion-header" type="button">Equipaje incluido 🧳 ▾</button>
                        <div class="accordion-body">
                            <label class="filtro-label">
                                <input type="checkbox" id="check-equipaje">
                                Agregar equipaje en bodega
                            </label>
                            <p class="equipaje-info">El costo varía según la aerolínea y se suma al precio del vuelo.</p>
                        </div>
                    </div>
                </div>
 
            </aside>
 
            <!-- GRILLA de resultados -->
            <section class="grilla-resultados" id="grilla-resultados">
            </section>
 
        </section>
    </main>
 
    <footer id="footer"></footer>
    <script src="../JS/header-footer.js"></script>
    <script src="../JS/script.js"></script>
    <script src="../JS/resultado_busqueda.js"></script>
</body>
 
</html>
