<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP INTEGRADOR 2026</title>
    <link rel="stylesheet" href="../CSS/styles.css">
    <link rel="stylesheet" href="../CSS/etiquetas.css">

<!-- ****************************************************
    Se deberá maquetar como mínimo las siguientes vistas:
    1. Vista Inicio.
    2. Vista de Resultados de búsqueda.
    3. Vista detalle de vuelo.
    4. Vista checkout
    5. Vista mis reservas

<body>
    <header>
        <nav class="menu">
            <p>logo</p>
        </nav>
        <nav class="menu">
            <p>inicio</p>
            <p>vuelos</p>
            <p>ofertas</p>
            <p>contacto</p>
        </nav>
    </header>
    <main>
        <section class="section-vuelo">
            <p class="etiqueta-vuelo">Vuelos</p>
            <form action="" class="form">
                <label for="desde">Desde</label>
                <select name="desde" id="" class="campos-form">
                    <option value=""></option>
                    <option value="Ezeiza, Buenos Aires">Ezeiza, Buenos Aires</option>
                    <option value="Aeroparque, CABA">Aeroparque, CABA</option>
                    <option value="Bariloche, Rio Negro">Bariloche, Rio Negro</option>
                </select>
                <label for="destino">Destino</label>
                <select name="desde" id="" class="campos-form">
                    <option value=""></option>
                    <option value="Ezeiza, Buenos Aires">Ezeiza, Buenos Aires</option>
                    <option value="Aeroparque, CABA">Aeroparque, CABA</option>
                    <option value="Bariloche, Rio Negro">Bariloche, Rio Negro</option>
                </select>
                <label for="fecha-salida">Fecha Salida</label>
                <input type="date" name="fecha-salida" id="" class="campos-form">
                <label for="hora-salida">Hora Salida</label>
                <input type="time" name="hora-salida" id="" class="campos-form">
                <div>
                    <a href=""></a><input type="submit" name="buscar" id="" class="aceptar" value="BUSCAR">
                    <input type="reset" name="cancelar" id="" class="reset" value="CANCELAR">
                </div>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; Todos los derechos reservados 2026.</p>
    </footer>
</body>

</html>
