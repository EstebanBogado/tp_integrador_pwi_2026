<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP INTEGRADOR 2026</title>
    <link rel="stylesheet" type="text/css" href="/CSS/styles.css">
    <link rel=" stylesheet" type="text/css" href="/CSS/etiquetas.css">
    <link rel="stylesheet" type="text/css" href="/CSS/index.css">
    <link rel="stylesheet" type="text/css"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<!-- ****************************************************
Se deberá maquetar como mínimo las siguientes vistas:
1. Vista Inicio.
2. Vista de Resultados de búsqueda-ENCAMINADA
3. Vista detalle de vuelo-EN PROCESO
4. Vista checkout-LISTA
5. Vista mis reservas
**************************************************** -->

<body>
    <header id="header"></header>
    <main>
        <section class="section-vuelo">
            <p class="etiqueta-vuelo">
                <i class="fa-solid fa-magnifying-glass"></i> Busca tu vuelo
            </p>

            <form action="../PAGES/resultado busqueda.html" method="get" class="form">
                <div id="grupo-fecha-vuelta">
                    <div class="form-row form-tipo">
                        <label class="radio-label">
                            <input type="radio" required name="tipo-viaje" value="ida-vuelta">
                            Ida y vuelta
                        </label>
                        <label class="radio-label">
                            <input type="radio" required name="tipo-viaje" value="solo-ida">
                            Sólo ida
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="desde">
                        <i class="fa-solid fa-plane-departure"></i> Origen
                    </label>
                    <select name="desde" id="desde" class="campos-form" required>
                        <option value="" disabled selected>Seleccionar origen</option>
                        <option value="BUE">Ezeiza, Buenos Aires (EZE)</option>
                        <option value="AEP">Aeroparque, CABA (AEP)</option>
                        <option value="BRC">Bariloche, Río Negro (BRC)</option>
                        <option value="COR">Córdoba (COR)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="destino">
                        <i class="fa-solid fa-plane-arrival"></i> Destino
                    </label>
                    <select name="destino" id="destino" class="campos-form" required>
                        <option value="" disabled selected>Seleccionar destino</option>
                        <option value="MAD">Madrid (MAD)</option>
                        <option value="MIA">Miami (MIA)</option>
                        <option value="LIM">Lima (LIM)</option>
                        <option value="GRU">São Paulo (GRU)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="fecha-salida">
                        <i class="fa-regular fa-calendar"></i> Fecha Ida
                    </label>
                    <input type="date" name="fecha-salida" id="fecha-salida" class="campos-form" required>
                </div>

                <div class="form-group">
                    <label for="fecha-vuelta">
                        <i class="fa-regular fa-calendar"></i> Fecha Vuelta
                    </label>
                    <input type="date" name="fecha-vuelta" id="fecha-vuelta" class="campos-form" required>
                </div>

                <div class="form-group">
                    <label for="pasajeros">
                        <i class="fa-solid fa-user"></i> Pasajeros
                    </label>
                    <select name="pasajeros" id="pasajeros" class="campos-form" required>
                        <option value="" disabled selected></option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="clase">
                        <i class="fa-solid fa-chair"></i> Clase
                    </label>
                    <select name="clase" id="clase" class="campos-form" required>
                        <option value="" disabled selected></option>
                        <option value="economica">Económica</option>
                        <option value="ejecutiva">Ejecutiva</option>
                        <option value="primera">Primera</option>
                    </select>
                </div>

                <div class="form-actions">
                    <input type="submit" value="BUSCAR VUELOS" class="aceptar">
                    <input type="reset" value="CANCELAR" class="reset">
                </div>
            </form>
        </section>

        <section class="destinos-favoritos">
            <h1>NUESTROS DESTINOS MÁS ELEGIDOS</h1>
        </section>
        <section>
            <div class="seccion-vacaciones">
                <article>
                    <a href="../PAGES/resultado busqueda.html">
                        <p class="titulo">VACACIONES EN BARILOCHE</p>
                        <img src="../IMG/vacaciones-bariloche.jpg" alt="vacaciones en Bariloche">
                    </a>
                </article>
                <article>
                    <a href="../PAGES/resultado busqueda.html">
                        <p class="titulo">VACACIONES EN MENDOZA</p>
                        <img src="../IMG/vacaciones-mendoza.jpg" alt="vacaciones en Mendoza">
                    </a>
                </article>
                <article>
                    <a href="../PAGES/resultado busqueda.html">

                        <p class="titulo">VACACIONES EN CAFAYATE</p>
                        <img src="/IMG/vacaciones-cafayate.jpg" alt="vacaciones en Salta">
                    </a>
                </article>
            </div>
        </section>
    </main>
    <footer id="footer"></footer>
    <script src="../JS/script.js"></script>

</body>

</html>
